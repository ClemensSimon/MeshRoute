# Home Assistant Package: MeshRoute GitHub Monitor
# Deploy to: HA /config/packages/meshroute_github.yaml

mqtt:
  sensor:
    - name: "MeshRoute GitHub Stars"
      state_topic: "simon42/meshroute/github/stars"
      value_template: "{{ value_json.count | default(0) }}"
      icon: "mdi:star"
      unit_of_measurement: ""
      json_attributes_topic: "simon42/meshroute/github/stars"

    - name: "MeshRoute GitHub Activity"
      state_topic: "simon42/meshroute/github/activity"
      value_template: "{{ value_json.type | default('none') }}"
      icon: "mdi:github"
      json_attributes_topic: "simon42/meshroute/github/activity"

    - name: "MeshRoute GitHub Last Check"
      state_topic: "simon42/meshroute/github/status"
      value_template: "{{ value_json.last_check | default('unknown') }}"
      icon: "mdi:clock-check"
      json_attributes_topic: "simon42/meshroute/github/status"

  binary_sensor:
    - name: "MeshRoute New Feedback"
      state_topic: "simon42/meshroute/github/new_feedback"
      payload_on: "true"
      payload_off: "false"
      icon: "mdi:message-alert"
      device_class: "problem"

automation:
  - alias: "MeshRoute: GitHub Feedback Notification"
    id: meshroute_github_notification
    trigger:
      - platform: mqtt
        topic: "simon42/meshroute/github/activity"
    condition:
      - condition: template
        value_template: >
          {{ trigger.payload_json is defined and
             trigger.payload_json.type in ['discussion_comment', 'issue', 'pr', 'stars'] }}
      - condition: template
        value_template: >
          {{ trigger.payload_json.author | default('') != 'ClemensSimon' }}
    action:
      - service: persistent_notification.create
        data:
          title: >
            MeshRoute: {{ trigger.payload_json.type | replace('_', ' ') | title }}
          message: >
            {% set p = trigger.payload_json %}
            {% if p.type == 'discussion_comment' %}
            @{{ p.author }} commented on Discussion #{{ p.discussion }}:
            {{ p.body }}
            {{ p.url }}
            {% elif p.type == 'issue' %}
            @{{ p.author }} opened Issue #{{ p.number }}:
            {{ p.title }}
            {{ p.url }}
            {% elif p.type == 'pr' %}
            @{{ p.author }} opened PR #{{ p.number }}:
            {{ p.title }}
            {{ p.url }}
            {% elif p.type == 'stars' %}
            +{{ p.new }} new star(s)! Total: {{ p.count }}
            {% endif %}
          notification_id: "meshroute_github_{{ now().timestamp() | int }}"
      - service: mqtt.publish
        data:
          topic: "simon42/meshroute/github/new_feedback"
          payload: "true"
          retain: true
