; MeshRoute System 5 — Firmware for LoRa Mesh Routing
; Build: pio run -e heltec_v3 / tbeam / rak4631

[platformio]
default_envs = heltec_v3

[common]
build_flags =
    -I include
    -D S5_FIRMWARE_VERSION=\"0.1.0\"
    -Wall
lib_deps =
    jgromes/RadioLib@^6.6.0
    olikraus/U8g2@^2.35.0
    mikalhart/TinyGPSPlus@^1.0.3

; ── Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262) ────────────────

[env:heltec_v3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
build_flags =
    ${common.build_flags}
    -D BOARD_HELTEC_V3
lib_deps = ${common.lib_deps}

; ── TTGO T-Beam v1.1 (ESP32 + SX1276 + GPS + AXP192) ──────────

[env:tbeam]
platform = espressif32
board = ttgo-t-beam
framework = arduino
monitor_speed = 115200
build_flags =
    ${common.build_flags}
    -D BOARD_TBEAM
lib_deps =
    ${common.lib_deps}
    lewisxhe/AXP202X_Library@^1.1.3

; ── RAK4631 (nRF52840 + SX1262) ────────────────────────────────

[env:rak4631]
platform = nordicnrf52
board = wiscore_rak4631
framework = arduino
monitor_speed = 115200
build_flags =
    ${common.build_flags}
    -D BOARD_RAK4631
lib_deps =
    jgromes/RadioLib@^6.6.0
    mikalhart/TinyGPSPlus@^1.0.3
    ; U8g2 not needed (no display on RAK4631 base)

; ── Native (unit tests on PC) ──────────────────────────────────

[env:native]
platform = native
build_flags =
    -I include
    -D S5_FIRMWARE_VERSION=\"0.1.0\"
    -std=c11
    -lm
test_build_src = true
