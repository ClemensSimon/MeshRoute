; MeshRoute System 5 — Firmware Prototype
; PlatformIO build configuration for ESP32

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -I include
    -D S5_FIRMWARE_VERSION=\"0.1.0\"
lib_deps =
    ; Meshtastic dependencies would go here
    ; For standalone testing, none needed

[env:native]
platform = native
build_flags =
    -I include
    -D S5_FIRMWARE_VERSION=\"0.1.0\"
    -std=c11
